<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - ShopManager{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .sidebar-link.active {
            background-color: #1e293b;
            color: white;
            border-left: 4px solid #3b82f6;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body class="text-gray-900">

    <div class="flex h-screen overflow-hidden">

        {% include "partials/sidebar.html" %}

        <main class="flex-1 flex flex-col min-w-0 bg-gray-50 overflow-y-auto">
            {% include "partials/topbar.html" %}

            <div class="p-8 max-w-7xl mx-auto w-full">
                {% block content %}{% endblock %}
            </div>
        </main>

    </div>

    {% include "partials/toast.html" %}

    <script>
        // Tab-like sidebar highlighting based on current page
        document.addEventListener('DOMContentLoaded', function () {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.sidebar-link').forEach(link => {
                const href = link.getAttribute('href');
                if (currentPath === href || (currentPath === '/' && href === '{{ url_for("index") }}')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        });
    </script>

    {% block extra_scripts %}{% endblock %}

</body>

</html>
