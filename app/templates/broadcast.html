{% extends "base.html" %}

{% block title %}ShopManager - Broadcast{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="max-w-2xl mx-auto bg-white p-10 rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-50">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-purple-100 text-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z" /></svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-800">Diffusion Massive</h2>
            <p class="text-gray-400 mt-2">Envoyez une promotion à tous vos clients WhatsApp via n8n.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Message promotionnel</label>
                <textarea id="promo-msg" rows="6" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-purple-500 focus:outline-none transition-all placeholder:text-gray-300" placeholder="Ex: Bonjour ! -20% sur toute la boutique ce weekend avec le code WEEK20..."></textarea>
            </div>
            <button onclick="sendPromotion()" id="btn-promo" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-extrabold text-lg shadow-lg shadow-purple-200 hover:bg-purple-700 hover:scale-[1.01] active:scale-95 transition-all flex items-center justify-center gap-3">
                <span>Envoyer la Campagne</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    function sendPromotion() {
        const msg = document.getElementById('promo-msg').value;
        if (!msg) {
            showToast("Veuillez saisir un message.", "!");
            return;
        }

        const btn = document.getElementById('btn-promo');
        btn.innerHTML = `Diffusion en cours... <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>`;
        btn.disabled = true;

        setTimeout(() => {
            btn.innerHTML = `<span>Envoyer la Campagne</span> <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>`;
            btn.disabled = false;
            document.getElementById('promo-msg').value = "";
            showToast("Campagne envoyée à tous les clients !", "✓");
        }, 2000);
    }
</script>
{% endblock %}
