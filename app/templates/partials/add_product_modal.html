<!-- Add Product Modal -->
<div id="add-product-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4 overflow-y-auto">
    <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full my-auto overflow-hidden">
        <!-- Modal Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-8 py-6">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold text-white">Nouveau Produit</h2>
                <button onclick="closeProductModal()" class="text-white hover:bg-white hover:bg-opacity-20 rounded-lg p-2 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <p class="text-blue-100 text-sm mt-1">Ajouter un nouveau produit à votre catalogue</p>
        </div>

        <!-- Modal Body -->
        <form id="product-form" class="px-8 py-6 space-y-5" onsubmit="handleAddProduct(event)">
            <!-- SKU Field -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Code SKU *</label>
                <input 
                    type="text" 
                    name="sku" 
                    required
                    placeholder="Ex: PRD-001"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors text-sm"
                >
            </div>

            <!-- Product Name Field -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nom du Produit *</label>
                <input 
                    type="text" 
                    name="name" 
                    required
                    placeholder="Ex: Écouteurs Wireless Pro"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors text-sm"
                >
            </div>

            <!-- Price Field -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Prix (DH) *</label>
                <div class="relative">
                    <input 
                        type="number" 
                        name="price" 
                        step="1"
                        min="0"
                        required
                        placeholder="0"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors text-sm"
                    >
                    <span class="absolute right-4 top-3 text-gray-500 font-semibold">DH</span>
                </div>
            </div>

            <!-- Stock Field -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Stock Initial</label>
                <input 
                    type="number" 
                    name="stock" 
                    min="0"
                    value="0"
                    placeholder="0"
                    class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition-colors text-sm"
                >
            </div>

            <!-- Active Toggle -->
            <div class="flex items-center justify-between pt-3">
                <label class="text-sm font-bold text-gray-700">Produit Actif</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_active" checked class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                </label>
            </div>

            <!-- Form Actions -->
            <div class="flex gap-3 pt-6 border-t border-gray-100">
                <button 
                    type="button" 
                    onclick="closeProductModal()"
                    class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 text-gray-700 font-bold hover:bg-gray-50 transition-colors"
                >
                    Annuler
                </button>
                <button 
                    type="submit"
                    class="flex-1 px-4 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Créer Produit
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function openProductModal() {
        document.getElementById('add-product-modal').classList.remove('hidden');
        document.getElementById('product-form').reset();
    }

    function closeProductModal() {
        document.getElementById('add-product-modal').classList.add('hidden');
    }

    function handleAddProduct(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        
        // Get form values and convert price to cents
        const price = parseFloat(formData.get('price')) || 0;
        const stock = parseInt(formData.get('stock')) || 0;
        
        const data = {
            sku: formData.get('sku').trim(),
            name: formData.get('name').trim(),
            price: parseFloat(price), // Price in DH
            stock: stock,
            is_active: document.querySelector('input[name="is_active"]').checked
        };

        console.log('Product to add:', data);
        
        // Send to backend
        fetch('/api/products', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {
                    throw new Error(err.error || 'Error creating product');
                });
            }
            return response.json();
        })
        .then(result => {
            showToast('Produit créé avec succès!', '✓');
            closeProductModal();
            // Reset form
            document.getElementById('product-form').reset();
            // Reload page to see new product
            setTimeout(() => location.reload(), 500);
        })
        .catch(error => {
            console.error('Error:', error);
            showToast('Erreur: ' + error.message, '✗');
        });
    }

    // Close modal when clicking outside
    document.getElementById('add-product-modal')?.addEventListener('click', function(e) {
        if (e.target === this) {
            closeProductModal();
        }
    });
</script>
