<!-- Simple Notification Toast -->
<div id="toast" class="fixed bottom-8 right-8 bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl translate-y-20 opacity-0 transition-all duration-500 z-50 flex items-center gap-3">
    <span id="toast-icon" class="text-blue-400 font-bold">✓</span>
    <span id="toast-msg">Action réussie !</span>
</div>

<script>
    // Toast Helper
    function showToast(msg, icon) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        document.getElementById('toast-icon').innerText = icon;
        
        toast.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => {
            toast.classList.add('translate-y-20', 'opacity-0');
        }, 3000);
    }
</script>
